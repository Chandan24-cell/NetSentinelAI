<!DOCTYPE html>
<html>
<head>
    <title>NetSentinelAI – Threat Intelligence Console</title>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-ant-path@1.3.0/dist/leaflet-ant-path.min.js"></script>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom -->
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="/static/favicon.ico">
</head>
<body>
<div class="dashboard">

    <!-- TOP ROW -->
    <div class="row top-row">
        <div class="box">
            <h3>LIVE PACKET INSPECTION [REAL-TIME]</h3>
            <div class="content">
                <table class="table table-dark table-sm mb-0">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Src IP</th>
                            <th>Dest IP</th>
                            <th>Proto</th>
                            <th>Size</th>
                        </tr>
                    </thead>
                    <tbody id="livePacketsTable">
                    </tbody>
                </table>
            </div>
        </div>

        <div class="box">
            <h3>GRAPH</h3>
            <div class="content">
                <canvas id="attackChart" height="100%"></canvas>
                <div id="attackMap" style="height: 50%; width: 100%; border-radius: 8px;"></div>
                <canvas id="trafficChart" width="100%" height="100" style="display: block; margin-top: 10px;"></canvas>
            </div>
        </div>
    </div>

    <!-- BOTTOM ROW -->
    <div class="row bottom-row">
        <div class="box">
            <h3>RECENT ALERTS [THREAT INTEL]</h3>
            <div class="content">
                <table class="table table-hover table-sm mb-0">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Threat</th>
                            <th>Confidence</th>
                            <th>Source IP</th>
                            <th>Dest IP</th>
                            <th>Protocol</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="alertsTable">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

    <script src="/static/app.js"></script>
    <script>
        // Auto-refresh
        document.addEventListener('DOMContentLoaded', function() {
            fetchAlerts();
            setInterval(fetchAlerts, 2000);
            setInterval(updateLiveMetrics, 5000);
        });
    </script>
</body>
</html>
