<!DOCTYPE html>
<html>
<head>
    <title>Production IDS Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="/static/favicon.ico">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-12">
                <h1>🚨 Production IDS Dashboard</h1>
                <div class="row">
                    <div class="col-md-3">
                        <div class="card bg-danger text-white">
                            <div class="card-body">
                                <h5>Live Packets</h5>
                                <h2 id="livePackets">0</h2>
                                <small>packets/sec</small>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card bg-warning text-white">
                            <div class="card-body">
                                <h5>Active Alerts</h5>
                                <h2 id="activeAlerts">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card bg-secondary text-white">
                            <div class="card-body">
                                <h5>Blocked IPs</h5>
                                <h2 id="blockedCount">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card bg-info text-white">
                            <div class="card-body">
                                <h5>DDoS Detected</h5>
                                <h2 id="ddosCount">0</h2>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="row mt-4">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h5>Attack Timeline (Last 10min)</h5>
                            </div>
                            <div class="card-body p-0">
                                <canvas id="attackChart" height="200"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h5>🚨 Top Attackers (Last 100 alerts)</h5>
                            </div>
                            <div class="card-body">
                                <ul id="attackerList" class="list-group list-group-flush">
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="row mt-4">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header">
                                <h5>Recent Alerts</h5>
                            </div>
                            <div class="card-body p-0">
                                <table class="table table-hover table-sm mb-0">
                                    <thead>
                                        <tr>
                                            <th>Time</th>
                                            <th>Threat</th>
                                            <th>Source IP</th>
                                            <th>Dest IP</th>
                                            <th>Protocol</th>
                                            <th>Action</th>
                                        </tr>
                                    </thead>
                                    <tbody id="alertsTable">
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
    <script>
        // Auto-refresh
        document.addEventListener('DOMContentLoaded', function() {
            fetchAlerts();
            setInterval(fetchAlerts, 2000);
            setInterval(updateLiveMetrics, 5000);
        });
    </script>
</body>
</html>
